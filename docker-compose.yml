services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-backstage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backstage}
      POSTGRES_DB: ${POSTGRES_DB:-backstage_development}
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    # Sem mapeamento de porta — acessível apenas internamente pelos containers

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-backstage}:${POSTGRES_PASSWORD:-backstage}@db/${POSTGRES_DB:-backstage_development}
      RAILS_ENV: development
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-desenvolvimento_local_nao_usar_em_producao}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_ENV: ${ASAAS_ENV:-sandbox}

volumes:
  postgres_data:
  bundle_cache:
