<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Backstage — Sem conexão</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #18181b;
      color: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #27272a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #a1a1aa; line-height: 1.6; max-width: 280px; }
    button {
      margin-top: 2rem;
      background: #4ade80;
      color: #18181b;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sem conexão</h1>
  <p>Você está offline. Verifique sua conexão e tente novamente.</p>
  <button onclick="location.reload()">Tentar novamente</button>
</body>
</html>
