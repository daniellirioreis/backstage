<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ação não permitida — Backstage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #18181b;
      color: #fafafa;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .illustration { margin-bottom: 1.75rem; }

    .code {
      font-size: 80px;
      font-weight: 700;
      color: #27272a;
      line-height: 1;
      font-family: Georgia, serif;
      margin-bottom: 0.5rem;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 14px;
      color: #71717a;
      line-height: 1.65;
      margin-bottom: 2rem;
      max-width: 300px;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #fafafa;
      color: #18181b;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 8px;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      color: #a1a1aa;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid #3f3f46;
    }

    footer {
      margin-top: 3rem;
      font-size: 12px;
      color: #3f3f46;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="illustration">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 210" width="300" height="210" role="img" aria-label="Personagem hexágono bloqueado por um segurança">
        <title>Ação não permitida</title>

        <!-- Piso do palco -->
        <rect x="15" y="192" width="270" height="8" rx="2" fill="#27272a"/>
        <line x1="15" y1="195" x2="285" y2="195" stroke="#3f3f46" stroke-width="0.8" stroke-dasharray="10,8"/>

        <!-- Holofote iluminando a placa de "Acesso negado" -->
        <g transform="translate(150,10) rotate(180,0,0)">
          <rect x="-9" y="0" width="18" height="28" rx="3" fill="#3f3f46"/>
          <rect x="-7" y="2" width="14" height="24" rx="2" fill="#52525b"/>
          <circle cx="0" cy="14" r="4" fill="#fbbf24" opacity="0.35"/>
          <polygon points="-18,28 18,28 28,90 -28,90" fill="#52525b" opacity="0.4"/>
        </g>

        <!-- Feixe de luz central -->
        <polygon points="132,10 168,10 178,192 122,192" fill="#4ade80" opacity="0.03"/>

        <!-- Círculo de luz no chão -->
        <ellipse cx="150" cy="190" rx="32" ry="6" fill="#4ade80" opacity="0.06"/>

        <!-- Placa de "ACESSO RESTRITO" -->
        <g transform="translate(110, 90)">
          <rect x="0" y="0" width="80" height="40" rx="4" fill="#27272a" stroke="#ef4444" stroke-width="1.5"/>
          <text x="40" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#ef4444" letter-spacing="1">ACESSO</text>
          <text x="40" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#ef4444" letter-spacing="1">RESTRITO</text>
          <!-- ícone cadeado -->
          <rect x="33" y="29" width="14" height="9" rx="2" fill="#ef4444" opacity="0.7"/>
          <path d="M36,29 Q36,23 40,23 Q44,23 44,29" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
          <circle cx="40" cy="34" r="1.5" fill="#27272a"/>
        </g>

        <!-- Poste da placa -->
        <line x1="150" y1="130" x2="150" y2="192" stroke="#3f3f46" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Personagem hexágono recuando surpreso -->
        <g transform="translate(188,108) rotate(8)">
          <ellipse cx="18" cy="74" rx="18" ry="3.5" fill="#000" opacity="0.2"/>
          <polygon points="18,0 32.12,8.5 32.12,25.5 18,34 3.88,25.5 3.88,8.5" fill="#18181b"/>
          <polygon points="18,2.5 29.62,9.5 29.62,24.5 18,31.5 6.38,24.5 6.38,9.5" fill="none" stroke="#4ade80" stroke-width="1.5"/>
          <text x="18" y="22" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="700" fill="#fafafa">B</text>
          <!-- olhos arregalados -->
          <circle cx="12" cy="12" r="3" fill="none" stroke="#4ade80" stroke-width="1"/>
          <circle cx="24" cy="12" r="3" fill="none" stroke="#4ade80" stroke-width="1"/>
          <circle cx="12" cy="12" r="1.2" fill="#4ade80"/>
          <circle cx="24" cy="12" r="1.2" fill="#4ade80"/>
          <!-- boca aberta O -->
          <circle cx="18" cy="25" r="2.5" fill="none" stroke="#4ade80" stroke-width="1"/>
          <!-- braços para trás (recuando) -->
          <line x1="3.88" y1="14" x2="-10" y2="8" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
          <line x1="32.12" y1="14" x2="44" y2="8" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
          <!-- pernas recuando -->
          <line x1="12" y1="34" x2="16" y2="58" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="24" y1="34" x2="28" y2="58" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="16" y1="58" x2="24" y2="58" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="28" y1="58" x2="36" y2="58" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
        </g>

        <!-- "!" de susto acima do personagem -->
        <text x="214" y="96" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="700" fill="#fbbf24" opacity="0.8">!</text>

        <!-- Estrelas -->
        <text x="38" y="55" font-size="12" fill="#fbbf24" opacity="0.5">★</text>
        <text x="258" y="75" font-size="10" fill="#fbbf24" opacity="0.4">✦</text>

        <!-- Notas musicais -->
        <text x="46" y="130" font-size="13" fill="#52525b" transform="rotate(-12,46,130)">♪</text>
        <text x="258" y="155" font-size="11" fill="#3f3f46" transform="rotate(8,258,155)">♫</text>
      </svg>
    </div>

    <div class="code">422</div>
    <div class="title">Acesso negado nos bastidores</div>
    <p class="subtitle">Você não tem permissão para realizar essa ação ou a sessão expirou.</p>

    <div class="actions">
      <a href="/" class="btn-primary">← Voltar ao início</a>
      <a href="javascript:history.back()" class="btn-secondary">Voltar</a>
    </div>

    <footer>© 2025 Backstage — Gestão de Eventos</footer>
  </div>
</body>
</html>
