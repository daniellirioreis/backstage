<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Erro — Backstage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #18181b;
      color: #fafafa;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .illustration { margin-bottom: 1.75rem; }

    .code {
      font-size: 80px;
      font-weight: 700;
      color: #27272a;
      line-height: 1;
      font-family: Georgia, serif;
      margin-bottom: 0.5rem;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 14px;
      color: #71717a;
      line-height: 1.65;
      margin-bottom: 2rem;
      max-width: 300px;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #fafafa;
      color: #18181b;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 8px;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      color: #a1a1aa;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      cursor: pointer;
    }

    footer {
      margin-top: 3rem;
      font-size: 12px;
      color: #3f3f46;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="illustration">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 210" width="300" height="210" role="img" aria-label="Personagem hexágono correndo em direção a um holofote">
        <title>Holofote perdido</title>

        <!-- Piso do palco -->
        <rect x="15" y="192" width="270" height="8" rx="2" fill="#27272a"/>
        <line x1="15" y1="195" x2="285" y2="195" stroke="#3f3f46" stroke-width="0.8" stroke-dasharray="10,8"/>

        <!-- Holofote no teto -->
        <g transform="translate(210,12) rotate(140,0,0)">
          <rect x="-9" y="0" width="18" height="28" rx="3" fill="#3f3f46"/>
          <rect x="-7" y="2" width="14" height="24" rx="2" fill="#52525b"/>
          <!-- lâmpada -->
          <circle cx="0" cy="14" r="4" fill="#fbbf24" opacity="0.35"/>
          <polygon points="-16,28 16,28 28,82 -28,82" fill="#52525b" opacity="0.55"/>
        </g>

        <!-- Feixe de luz do holofote -->
        <polygon points="178,12 194,12 138,192 116,192" fill="#4ade80" opacity="0.04"/>
        <polygon points="181,12 191,12 134,192 120,192" fill="#4ade80" opacity="0.04"/>

        <!-- Círculo de luz no chão (vazio) -->
        <ellipse cx="129" cy="190" rx="30" ry="7" fill="#4ade80" opacity="0.07"/>

        <!-- "?" flutuando no feixe -->
        <text x="129" y="155" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="700" fill="#4ade80" opacity="0.1">?</text>

        <!-- Personagem hexágono correndo -->
        <g transform="translate(155,112) rotate(-8)">
          <!-- sombra -->
          <ellipse cx="18" cy="80" rx="20" ry="4" fill="#000" opacity="0.2"/>
          <!-- corpo -->
          <polygon points="18,0 32.12,8.5 32.12,25.5 18,34 3.88,25.5 3.88,8.5" fill="#18181b"/>
          <polygon points="18,2.5 29.62,9.5 29.62,24.5 18,31.5 6.38,24.5 6.38,9.5" fill="none" stroke="#4ade80" stroke-width="1.5"/>
          <!-- letra B -->
          <text x="18" y="22" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="700" fill="#fafafa">B</text>
          <!-- olhos correndo (arregalados) -->
          <circle cx="12" cy="12" r="2.5" fill="none" stroke="#4ade80" stroke-width="1"/>
          <circle cx="24" cy="12" r="2.5" fill="none" stroke="#4ade80" stroke-width="1"/>
          <circle cx="12" cy="12" r="1" fill="#4ade80"/>
          <circle cx="24" cy="12" r="1" fill="#4ade80"/>
          <!-- boca O (surpreso) -->
          <ellipse cx="18" cy="24" rx="3" ry="2.5" fill="none" stroke="#4ade80" stroke-width="1"/>
          <!-- braços pra frente (correndo) -->
          <line x1="3.88" y1="16" x2="-12" y2="6" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
          <line x1="32.12" y1="16" x2="46" y2="22" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
          <!-- pernas alternadas (correndo) -->
          <line x1="11" y1="34" x2="3" y2="58" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="25" y1="34" x2="34" y2="56" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
          <!-- pés -->
          <line x1="3" y1="58" x2="-6" y2="58" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="34" y1="56" x2="43" y2="60" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
        </g>

        <!-- Rastro de passos -->
        <ellipse cx="222" cy="191" rx="6" ry="2" fill="#4ade80" opacity="0.1" transform="rotate(-10,222,191)"/>
        <ellipse cx="208" cy="190" rx="5" ry="1.8" fill="#4ade80" opacity="0.08" transform="rotate(-10,208,190)"/>
        <ellipse cx="196" cy="191" rx="4" ry="1.5" fill="#4ade80" opacity="0.06" transform="rotate(-10,196,191)"/>

        <!-- Cabo do holofote (fio caindo) -->
        <path d="M215,12 Q240,40 228,70 Q218,95 235,115" stroke="#3f3f46" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4,4"/>

        <!-- Estrelas decorativas -->
        <text x="28" y="38" font-size="14" fill="#fbbf24" opacity="0.7">★</text>
        <text x="262" y="80" font-size="11" fill="#fbbf24" opacity="0.6">★</text>
        <text x="48" y="110" font-size="10" fill="#fbbf24" opacity="0.4">✦</text>

        <!-- Notas musicais flutuando -->
        <text x="38" y="68" font-size="16" fill="#52525b" transform="rotate(-18,38,68)">♪</text>
        <text x="258" y="128" font-size="13" fill="#52525b" transform="rotate(12,258,128)">♫</text>

        <!-- Cabos/peças soltas no chão -->
        <path d="M30,192 Q45,185 60,192" stroke="#52525b" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="72" cy="191" r="3" fill="#3f3f46"/>
        <rect x="246" y="186" width="8" height="8" rx="1" fill="#3f3f46" transform="rotate(25,250,190)"/>
      </svg>
    </div>

    <div class="code">500</div>
    <div class="title">Perdemos o roteiro do evento</div>
    <p class="subtitle">Algo saiu do script aqui nos bastidores. Nossa equipe já está atrás da solução.</p>

    <div class="actions">
      <a href="/" class="btn-primary">← Voltar ao início</a>
      <button onclick="location.reload()" class="btn-secondary">Tentar novamente</button>
    </div>

    <footer>© 2025 Backstage — Gestão de Eventos</footer>
  </div>
</body>
</html>
